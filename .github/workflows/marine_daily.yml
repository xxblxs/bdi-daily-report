name: ISOWAY 海况日报 · 全球航线

# ──────────────────────────────────────────────────────────────────────────────
# 触发规则
# ──────────────────────────────────────────────────────────────────────────────
on:
  schedule:
    - cron: '0 4 * * *'    # UTC 04:00（北京时间 12:00）每日一次

  # 支持手动触发（调试用）
  workflow_dispatch:
    inputs:
      output_dir:
        description: '报告输出目录'
        type: string
        default: './reports'

# ──────────────────────────────────────────────────────────────────────────────
# 权限（最小化）
# ──────────────────────────────────────────────────────────────────────────────
permissions:
  contents: write   # 回提交 SEO JSON 归档

# ──────────────────────────────────────────────────────────────────────────────
# Job
# ──────────────────────────────────────────────────────────────────────────────
jobs:
  marine-report:
    name: 生成并推送海况日报
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 配置 Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 安装依赖
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          playwright install chromium --with-deps

      - name: 执行海况日报脚本
        run: |
          python marine_push.py \
            --output-dir ${{ github.event.inputs.output_dir || './reports' }}
        env:
          # ── 企业微信（必填）─────────────────────────────────────────────────
          WECOM_WEBHOOK: ${{ secrets.WECOM_WEBHOOK }}
          # ── 报告公开访问地址（选填，留空则微信卡片中无链接）──────────────────
          REPORT_URL:    ${{ secrets.REPORT_URL }}

      - name: 生成 SEO 报告页并发布
        env:
          OSS_ENDPOINT:     ${{ secrets.OSS_ENDPOINT }}
          OSS_BUCKET:       ${{ secrets.OSS_BUCKET }}
          OSS_AK_ID:        ${{ secrets.OSS_AK_ID }}
          OSS_AK_SECRET:    ${{ secrets.OSS_AK_SECRET }}
          BAIDU_PUSH_TOKEN: ${{ secrets.BAIDU_PUSH_TOKEN }}
          INDEXNOW_KEY:     ${{ secrets.INDEXNOW_KEY }}
        run: |
          python seo_pages/build_index.py out --site https://www.navgreen.cn
          LATEST=$(ls -1 seo_pages/data/sea-conditions/*.json 2>/dev/null | sort | tail -1 | xargs -n1 basename | sed 's/.json//')
          if [ -n "$LATEST" ]; then
            python seo_pages/publish.py out --urls "https://www.navgreen.cn/reports/sea-conditions/$LATEST/"
          fi

      - name: 归档 SEO JSON 快照
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore(seo): archive sea-conditions json [skip ci]"
          file_pattern: seo_pages/data/**/*.json

      - name: 上传 HTML 报告
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: marine-report-${{ github.run_id }}
          path: reports/marine_daily_*.html
          retention-days: 30
          if-no-files-found: warn

      - name: 发送失败告警到企业微信
        if: failure()
        run: |
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          curl -s -X POST "${{ secrets.WECOM_WEBHOOK }}" \
            -H "Content-Type: application/json" \
            -d "{\"msgtype\":\"markdown\",\"markdown\":{\"content\":\"## ⚠️ ISOWAY 海况日报执行失败\\n时间：$(date -u '+%Y-%m-%d %H:%M UTC')\\n\\n<font color=\\\"warning\\\">所有重试均已失败</font>\\n\\n[查看详细日志](${RUN_URL})\"}}"

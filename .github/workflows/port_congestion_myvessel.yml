name: ISOWAY 港口拥堵日报（船视宝版）

on:
  schedule:
    - cron: '0 4 * * *'    # UTC 04:00（北京时间 12:00）每日一次
  workflow_dispatch:
    inputs:
      demo_mode:
        description: '演示模式（模拟数据，测试推送格式用）'
        type: boolean
        default: false

permissions:
  contents: write   # 回提交 SEO JSON 归档

jobs:
  port-congestion:
    name: 港口拥堵日报推送
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: '3.11', cache: 'pip'}

      - name: 安装依赖
        run: |
          pip install -r requirements.txt
          playwright install chromium --with-deps

      - name: 恢复7日历史状态
        uses: actions/cache@v4
        with:
          path: reports/.port_state.json
          key: port-state-${{ github.run_id }}
          restore-keys: port-state-

      - run: mkdir -p reports

      - name: 执行港口拥堵日报
        run: |
          ARGS=""
          [ "${{ github.event.inputs.demo_mode }}" = "true" ] && ARGS="--demo"
          python port_congestion_myvessel.py --output-dir ./reports $ARGS
        env:
          WECOM_WEBHOOK:         ${{ secrets.WECOM_WEBHOOK }}
          WECOM_WEBHOOK_CUSTOM:  ${{ secrets.WECOM_WEBHOOK_CUSTOM }}
          MYVESSEL_APP_ID:       ${{ secrets.MYVESSEL_APP_ID }}
          MYVESSEL_APP_SECRET:   ${{ secrets.MYVESSEL_APP_SECRET }}

      - name: 保存历史状态
        uses: actions/cache/save@v4
        if: always()
        with:
          path: reports/.port_state.json
          key: port-state-${{ github.run_id }}

      - name: 生成 SEO 报告页并发布
        env:
          OSS_ENDPOINT:     ${{ secrets.OSS_ENDPOINT }}
          OSS_BUCKET:       ${{ secrets.OSS_BUCKET }}
          OSS_AK_ID:        ${{ secrets.OSS_AK_ID }}
          OSS_AK_SECRET:    ${{ secrets.OSS_AK_SECRET }}
          BAIDU_PUSH_TOKEN: ${{ secrets.BAIDU_PUSH_TOKEN }}
          INDEXNOW_KEY:     ${{ secrets.INDEXNOW_KEY }}
        run: |
          python seo_pages/build_index.py out --site https://www.navgreen.cn
          LATEST=$(ls -1 seo_pages/data/port-congestion/*.json 2>/dev/null | sort | tail -1 | xargs -n1 basename | sed 's/.json//')
          if [ -n "$LATEST" ]; then
            python seo_pages/publish.py out --urls "https://www.navgreen.cn/reports/port-congestion/$LATEST/"
          fi

      - name: 归档 SEO JSON 快照
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore(seo): archive port-congestion json [skip ci]"
          file_pattern: seo_pages/data/**/*.json

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: port-report-${{ github.run_id }}
          path: reports/port_congestion_*.html
          retention-days: 14

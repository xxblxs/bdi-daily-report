name: BDI 干散货日报自动推送

on:
  schedule:
    - cron: '0 4 * * 1-5'     # 北京时间 12:00，周一至周五
  workflow_dispatch:            # 允许在 GitHub 页面手动触发

jobs:
  send-report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout 代码
        uses: actions/checkout@v4

      - name: 设置 Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装 Python 依赖
        run: pip install -r requirements.txt

      - name: 安装 Playwright Chromium
        run: playwright install chromium --with-deps

      - name: 执行日报脚本（BDI + 燃油）
        env:
          WECOM_WEBHOOK:    ${{ secrets.WECOM_WEBHOOK }}
          NAVGREEN_TOKEN:   ${{ secrets.NAVGREEN_TOKEN }}
          DINGTALK_WEBHOOK: ${{ secrets.DINGTALK_WEBHOOK }}
          SLACK_WEBHOOK:    ${{ secrets.SLACK_WEBHOOK }}
          FEISHU_WEBHOOK:   ${{ secrets.FEISHU_WEBHOOK }}
          SMTP_HOST:        ${{ secrets.SMTP_HOST }}
          SMTP_PORT:        ${{ secrets.SMTP_PORT }}
          SMTP_USER:        ${{ secrets.SMTP_USER }}
          SMTP_PASS:        ${{ secrets.SMTP_PASS }}
          EMAIL_FROM:       ${{ secrets.EMAIL_FROM }}
          EMAIL_TO:         ${{ secrets.EMAIL_TO }}
        run: python bdi_daily_push_add_fuel.py

      - name: 保存 HTML 报告为 Artifact
        uses: actions/upload-artifact@v4
        with:
          name: navgreen-reports-${{ github.run_id }}
          path: reports/
          retention-days: 30

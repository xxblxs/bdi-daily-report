name: BDI 干散货日报自动推送

on:
  schedule:
    - cron: '0 4 * * *'        # UTC 04:00（北京时间 12:00）每日一次
  workflow_dispatch:            # 允许在 GitHub 页面手动触发

jobs:
  send-report:
    runs-on: ubuntu-latest
    permissions:
      contents: write          # 允许把 SEO JSON 快照回提交，积累历史归档

    steps:
      - name: Checkout 代码
        uses: actions/checkout@v4

      - name: 设置 Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装 Python 依赖
        run: pip install -r requirements.txt

      - name: 安装 Playwright Chromium
        run: playwright install chromium --with-deps

      - name: 执行日报脚本（BDI + 燃油）
        env:
          WECOM_WEBHOOK:    ${{ secrets.WECOM_WEBHOOK }}
          NAVGREEN_TOKEN:   ${{ secrets.NAVGREEN_TOKEN }}
          DINGTALK_WEBHOOK: ${{ secrets.DINGTALK_WEBHOOK }}
          SLACK_WEBHOOK:    ${{ secrets.SLACK_WEBHOOK }}
          FEISHU_WEBHOOK:   ${{ secrets.FEISHU_WEBHOOK }}
          SMTP_HOST:        ${{ secrets.SMTP_HOST }}
          SMTP_PORT:        ${{ secrets.SMTP_PORT }}
          SMTP_USER:        ${{ secrets.SMTP_USER }}
          SMTP_PASS:        ${{ secrets.SMTP_PASS }}
          EMAIL_FROM:       ${{ secrets.EMAIL_FROM }}
          EMAIL_TO:         ${{ secrets.EMAIL_TO }}
        run: python bdi_daily_push_add_fuel.py

      # ── SEO：生成可收录网页 → 上传 OSS → 推送搜索引擎 ────────────────────────
      # 主脚本已把当日数据写入 seo_pages/data/bdi-market/<date>.json。
      # 下面据此(以及历史归档)重建每日页 + hub + sitemap，上传 OSS 并推送收录。
      # 缺少 OSS_/BAIDU_/INDEXNOW_ secret 时各步骤自动安全跳过（不报错）。
      - name: 生成 SEO 报告页并发布
        env:
          OSS_ENDPOINT:     ${{ secrets.OSS_ENDPOINT }}
          OSS_BUCKET:       ${{ secrets.OSS_BUCKET }}
          OSS_AK_ID:        ${{ secrets.OSS_AK_ID }}
          OSS_AK_SECRET:    ${{ secrets.OSS_AK_SECRET }}
          BAIDU_PUSH_TOKEN: ${{ secrets.BAIDU_PUSH_TOKEN }}
          INDEXNOW_KEY:     ${{ secrets.INDEXNOW_KEY }}
        run: |
          python seo_pages/build_index.py out --site https://www.navgreen.cn
          URLS=""
          for SLUG in bdi-market bunker-fuel; do
            LATEST=$(ls -1 seo_pages/data/$SLUG/*.json 2>/dev/null | sort | tail -1 | xargs -n1 basename | sed 's/.json//')
            [ -n "$LATEST" ] && URLS="$URLS https://www.navgreen.cn/reports/$SLUG/$LATEST/"
          done
          [ -n "$URLS" ] && python seo_pages/publish.py out --urls $URLS || true

      - name: 归档 SEO JSON 快照（回提交，供历史 hub/归档）
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore(seo): archive report json [skip ci]"
          file_pattern: seo_pages/data/**/*.json

      - name: 保存 HTML 报告为 Artifact
        uses: actions/upload-artifact@v4
        with:
          name: navgreen-reports-${{ github.run_id }}
          path: |
            reports/
            out/reports/
          retention-days: 30

name: ISOWAY 热带气旋预警 · 全球监测

# ──────────────────────────────────────────────────────────────────────────────
# 触发规则：每日北京时间 12:00 推送一次
# ──────────────────────────────────────────────────────────────────────────────
on:
  schedule:
    - cron: '0 4 * * *'    # UTC 04:00（北京时间 12:00）每日一次

  # 手动触发（可强制推送）
  workflow_dispatch:
    inputs:
      force_push:
        description: '强制推送（忽略状态缓存）'
        type: boolean
        default: false

permissions:
  contents: write   # 需要写入 .cyclone_state.json 状态文件

jobs:
  cyclone-alert:
    name: 检查并推送气旋预警
    runs-on: ubuntu-latest
    timeout-minutes: 12

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 配置 Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 安装依赖
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          playwright install chromium --with-deps

      # 恢复上次的状态文件（防止重复推送）
      - name: 恢复状态缓存
        uses: actions/cache@v4
        with:
          path: reports/.cyclone_state.json
          key: cyclone-state-${{ github.run_id }}
          restore-keys: |
            cyclone-state-

      - name: 创建 reports 目录
        run: mkdir -p reports

      - name: 执行气旋预警脚本
        run: |
          FORCE_ARG=""
          if [ "${{ github.event.inputs.force_push }}" = "true" ]; then
            FORCE_ARG="--force"
          fi
          python cyclone_push.py --output-dir ./reports $FORCE_ARG
        env:
          WECOM_WEBHOOK:   ${{ secrets.WECOM_WEBHOOK }}
          # NAVGreen token — 提供实时台风位置和完整轨迹（强烈建议配置）
          # 获取方式：登录 vip.navgreen.cn → DevTools → Application → LocalStorage → 复制 "token"
          NAVGREEN_TOKEN:  ${{ secrets.NAVGREEN_TOKEN }}

      # 保存状态文件（缓存到下次运行）
      - name: 保存状态文件
        uses: actions/cache/save@v4
        if: always()
        with:
          path: reports/.cyclone_state.json
          key: cyclone-state-${{ github.run_id }}

      - name: 生成 SEO 报告页并发布（仅有活跃系统时）
        env:
          OSS_ENDPOINT:     ${{ secrets.OSS_ENDPOINT }}
          OSS_BUCKET:       ${{ secrets.OSS_BUCKET }}
          OSS_AK_ID:        ${{ secrets.OSS_AK_ID }}
          OSS_AK_SECRET:    ${{ secrets.OSS_AK_SECRET }}
          BAIDU_PUSH_TOKEN: ${{ secrets.BAIDU_PUSH_TOKEN }}
          INDEXNOW_KEY:     ${{ secrets.INDEXNOW_KEY }}
        run: |
          python seo_pages/build_index.py out --site https://www.navgreen.cn
          LATEST=$(ls -1 seo_pages/data/cyclone/*.json 2>/dev/null | sort | tail -1 | xargs -n1 basename | sed 's/.json//')
          if [ -n "$LATEST" ]; then
            python seo_pages/publish.py out --urls "https://www.navgreen.cn/reports/cyclone/$LATEST/"
          fi

      - name: 归档 SEO JSON 快照
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore(seo): archive cyclone json [skip ci]"
          file_pattern: seo_pages/data/**/*.json

      - name: 上传 HTML 预警报告
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cyclone-alert-${{ github.run_id }}
          path: reports/cyclone_alert_*.html
          retention-days: 14
          if-no-files-found: ignore

      - name: 发送失败告警
        if: failure()
        run: |
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          curl -s -X POST "${{ secrets.WECOM_WEBHOOK }}" \
            -H "Content-Type: application/json" \
            -d "{\"msgtype\":\"markdown\",\"markdown\":{\"content\":\"## ⚠️ ISOWAY 气旋监测脚本异常\\n时间：$(date -u '+%Y-%m-%d %H:%M UTC')\\n\\n[查看日志](${RUN_URL})\"}}"
